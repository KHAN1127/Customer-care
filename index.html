            overflow-x: hidden;

        .header {

            letter-spacing: 3px;

            color: #d4af37;
        }

        .slider-container { width: 100%; overflow: hidden; padding: 20px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .slider-track { display: flex; width: calc(280px * 20); animation: scrollHorizontal 35s linear infinite; gap: 20px; }
        .slide-item { width: 260px; height: 160px; flex-shrink: 0; border: 1px solid #333; background: #111; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes scrollHorizontal { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-280px * 10)); } }

        .hero-text-section { text-align: center; padding: 50px 8%; }
        .hero-text-section h1 { font-family: 'Playfair Display', serif; font-size: 40px; color: #fff; margin-bottom: 10px; }

        .products-section { padding: 10px 8%; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; }
        
        .product-card { background: #0a0a0a; border: 1px solid #222; padding: 20px; transition: 0.4s; text-align: center; }
        .product-card:hover { border-color: #d4af37; transform: translateY(-5px); }

        .img-container { width: 100%; height: 200px; overflow: hidden; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .product-card h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 5px; color: #fff; }
        .price { font-size: 20px; font-weight: 700; color: #d4af37; margin: 10px 0; }

        .floating-action-group { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #000; background: #d4af37; text-decoration: none; }
